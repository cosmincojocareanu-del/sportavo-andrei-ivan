<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Profile · Sportavo</title>
  <meta name="description" content="Official player profile powered by Sportavo.">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold:    '#C9A84C',
            'gold-l': '#E5C97A',
            'gold-d': '#8C6E2A',
            base:    '#080809',
            surface: '#0F0F11',
            raised:  '#161618',
            rim:     'rgba(255,255,255,0.07)',
          },
          fontFamily: {
            display: ['Sora', 'sans-serif'],
            body:    ['Manrope', 'sans-serif'],
          },
          letterSpacing: { tightest: '-0.04em', tight: '-0.025em' },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Root tokens ─────────────────────────────────────── */
    :root {
      --gold:      #C9A84C;
      --gold-l:    #E5C97A;
      --gold-dim:  rgba(201,168,76,0.12);
      --gold-glow: rgba(201,168,76,0.25);
      --base:      #080809;
      --surface:   #0F0F11;
      --raised:    #161618;
      --rim:       rgba(255,255,255,0.07);
      --text:      #F0F0EC;
      --muted:     #888891;
      --faint:     #3A3A42;
    }

    /* ── Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--base);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ───────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Typography ──────────────────────────────────────── */
    .font-display { font-family: 'Sora', sans-serif; }
    h1, h2, h3, h4 { font-family: 'Sora', sans-serif; font-weight: 700; }

    /* ── Section label (e.g. "01 / About") ──────────────── */
    .section-label {
      font-family: 'Manrope', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    /* ── Gold underline accent ───────────────────────────── */
    .gold-line {
      display: block;
      width: 2.5rem;
      height: 2px;
      background: var(--gold);
      margin-top: 0.75rem;
    }

    /* ── Card base ───────────────────────────────────────── */
    .card {
      background: var(--raised);
      border: 1px solid var(--rim);
      border-radius: 12px;
      box-shadow: 0 2px 0 rgba(255,255,255,0.04) inset,
                  0 20px 40px rgba(0,0,0,0.4);
    }

    /* ── Nav ─────────────────────────────────────────────── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      border-bottom: 1px solid transparent;
      background: linear-gradient(to bottom, rgba(8,8,9,0.55) 0%, rgba(8,8,9,0) 100%);
    }
    #nav.scrolled {
      background: rgba(8,8,9,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom-color: var(--rim);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-name {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
      color: var(--gold);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      transition: color 0.2s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .nav-links a:hover { color: #fff; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0.1rem;
      border: 1px solid var(--rim);
      border-radius: 6px;
      padding: 0.18rem 0.4rem;
    }
    .lang-btn {
      background: none;
      border: none;
      font-family: 'Sora', sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      padding: 0.18rem 0.38rem;
      border-radius: 3px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .lang-btn.active {
      color: var(--gold);
      background: var(--gold-dim);
    }
    .lang-btn:hover:not(.active) { color: var(--text); }
    .lang-sep {
      color: var(--faint);
      font-size: 0.58rem;
      pointer-events: none;
      user-select: none;
    }
    .nav-cta {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      background: var(--gold);
      color: #000;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-cta:hover { background: var(--gold-l); transform: translateY(-1px); }
    .nav-cta:active { transform: translateY(0); }
    @media (max-width: 768px) {
      .nav-links { display: none; }
    }

    /* ── Hero ─────────────────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 0%;
      background-repeat: no-repeat;
    }
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 0%;
      display: block;
    }
    @media (min-width: 768px) {
      .hero-bg    { background-position: center 15%; }
      .hero-video { object-position: center 15%; }
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(8,8,9,0.97) 0%, rgba(8,8,9,0.6) 40%, rgba(8,8,9,0.25) 70%, rgba(8,8,9,0.1) 100%),
        linear-gradient(to right, rgba(8,8,9,0.5) 0%, transparent 50%);
    }
    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 7rem 1.5rem 4.5rem;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 99px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .hero-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
    }
    .hero-name {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(3.2rem, 9vw, 8rem);
      line-height: 0.92;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 1.25rem;
    }
    .hero-name span { color: var(--gold); }
    .hero-headline {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: rgba(240,240,236,0.65);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .hero-tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      background: var(--raised);
      border: 1px solid var(--rim);
      color: var(--muted);
    }
    .hero-tag.accent {
      background: var(--gold-dim);
      border-color: rgba(201,168,76,0.25);
      color: var(--gold-l);
    }
    .hero-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      background: var(--gold);
      color: #000;
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--gold-l); transform: translateY(-2px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      background: transparent;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 8px;
      border: 1px solid var(--rim);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); transform: translateY(-2px); }
    .btn-ghost:active { transform: translateY(0); }
    .hero-scroll {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }
    .hero-scroll-line {
      width: 32px;
      height: 1px;
      background: var(--muted);
    }

    /* ── Section wrapper ─────────────────────────────────── */
    .section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 6rem 1.5rem;
    }
    .section-head { margin-bottom: 3.5rem; }
    .section-title {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-top: 0.75rem;
    }

    /* ── Story ───────────────────────────────────────────── */
    #story-section { border-top: 1px solid var(--rim); }
    .story-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 5rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .story-grid { grid-template-columns: 1fr; gap: 3rem; }
    }
    .story-text p {
      font-size: 1.05rem;
      line-height: 1.85;
      color: rgba(240,240,236,0.75);
      margin-bottom: 1.25rem;
    }
    .story-text p:last-child { margin-bottom: 0; }
    .story-image-frame {
      position: relative;
    }
    .story-image-frame img {
      width: 100%;
      border-radius: 10px;
      display: block;
      object-fit: cover;
      aspect-ratio: 3/4;
    }
    .story-image-frame::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      z-index: 0;
    }
    .story-image-frame img { position: relative; z-index: 1; }
    .story-detail-strip {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rim);
    }
    .story-detail {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .story-detail-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .story-detail-value {
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Career Timeline ─────────────────────────────────── */
    #career-section { border-top: 1px solid var(--rim); }
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold) 0%, transparent 100%);
    }
    .timeline-item {
      position: relative;
      padding-bottom: 3rem;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      position: absolute;
      left: -2.375rem;
      top: 6px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--base);
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .timeline-dot.current {
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,0.2), 0 0 12px rgba(201,168,76,0.4);
    }
    .timeline-years {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }
    .timeline-club {
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .timeline-role {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .timeline-note {
      font-size: 0.88rem;
      line-height: 1.7;
      color: rgba(240,240,236,0.5);
      max-width: 560px;
    }

    /* ── Key Stats ───────────────────────────────────────── */
    #stats-section {
      background: var(--surface);
      border-top: 1px solid var(--rim);
      border-bottom: 1px solid var(--rim);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0;
    }
    .stat-item {
      padding: 2.5rem 1.5rem;
      border-right: 1px solid var(--rim);
      text-align: center;
    }
    .stat-item:last-child { border-right: none; }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-item { border-bottom: 1px solid var(--rim); }
      .stat-item:nth-child(even) { border-right: none; }
    }
    .stat-number {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--gold);
      line-height: 1;
      display: block;
    }
    .stat-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ── Highlights ──────────────────────────────────────── */
    #highlights-section { border-top: 1px solid var(--rim); }
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
    }
    .highlight-card {
      background: var(--raised);
      border: 1px solid var(--rim);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .highlight-card:hover {
      border-color: rgba(201,168,76,0.35);
      transform: translateY(-4px);
    }
    .highlight-thumb {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--surface);
    }
    .highlight-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .highlight-card:hover .highlight-thumb img { transform: scale(1.04); }
    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8,8,9,0.4);
      transition: background 0.2s;
    }
    .highlight-card:hover .play-btn { background: rgba(8,8,9,0.2); }
    .play-circle {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(201,168,76,0.4);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .highlight-card:hover .play-circle { transform: scale(1.12); }
    .play-circle svg { margin-left: 3px; }
    .highlight-body { padding: 1.25rem 1.25rem 1.5rem; }
    .highlight-title {
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }
    .highlight-desc {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--muted);
    }

    /* ── Gallery ─────────────────────────────────────────── */
    #gallery-section { border-top: 1px solid var(--rim); }
    .gallery-columns {
      columns: 3;
      column-gap: 0.75rem;
    }
    @media (max-width: 900px) { .gallery-columns { columns: 2; } }
    @media (max-width: 560px) { .gallery-columns { columns: 1; } }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 0.75rem;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      border-radius: 8px;
      transition: transform 0.4s ease;
      background: var(--surface);
    }
    .gallery-item:hover img { transform: scale(1.03); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8,8,9,0.5) 0%, transparent 50%);
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gallery-item:hover::after { opacity: 1; }

    /* ── Social ──────────────────────────────────────────── */
    #social-section { border-top: 1px solid var(--rim); }
    .social-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 560px;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--raised);
      border: 1px solid var(--rim);
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .social-link:hover {
      border-color: rgba(201,168,76,0.3);
      transform: translateX(6px);
    }
    .social-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
    }
    .social-name {
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }
    .social-handle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }
    .social-arrow {
      margin-left: auto;
      color: var(--faint);
      transition: color 0.2s;
    }
    .social-link:hover .social-arrow { color: var(--gold); }

    /* ── Contact ─────────────────────────────────────────── */
    #contact-section { border-top: 1px solid var(--rim); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 800px) {
      .contact-grid { grid-template-columns: 1fr; }
    }
    .contact-intro {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(240,240,236,0.65);
      margin-bottom: 2rem;
    }
    .contact-email-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;

// Resolve a UI label with EN fallback
function ui(key, lang) {
  const dict = UI[lang] || UI.en;
  return dict[key] !== undefined ? dict[key] : (UI.en[key] !== undefined ? UI.en[key] : key);
}

// Resolve a translatable player field (string or {en, ro} object) with EN fallback
function t(field, lang) {
  if (field === null || field === undefined) return '';
  if (typeof field === 'string') return field;
  if (typeof field === 'object' && !Array.isArray(field)) {
    return field[lang] !== undefined ? field[lang] : (field.en || '');
  }
  return String(field);
}

// Resolve a translatable array field (array or {en: [...], ro: [...]}) with EN fallback
function tArr(field, lang) {
  if (!field) return [];
  if (Array.isArray(field)) return field;
  if (typeof field === 'object') {
    const arr = field[lang] !== undefined ? field[lang] : (field.en || []);
    return Array.isArray(arr) ? arr : [arr];
  }
  return [String(field)];
}

function shouldShow(sections, key, hasData) {
  if (sections && sections[key] === false) return false;
  if (!hasData) return false;
  if (Array.isArray(hasData) && hasData.length === 0) return false;
  return true;
}

function hasSocialData(p) {
  const s = p.socialLinks || {};

function buildSocial(p, lang) {
  const s = p.socialLinks || {};
  const ALL_PLATFORMS = [
    { key: 'instagram',    label: 'Instagram',    icon: ICONS.instagram },
    { key: 'tiktok',       label: 'TikTok',       icon: ICONS.tiktok },
    { key: 'facebook',     label: 'Facebook',     icon: ICONS.facebook },
    { key: 'youtube',      label: 'YouTube',      icon: ICONS.youtube },
    { key: 'x',            label: 'X / Twitter',  icon: ICONS.twitter },
    { key: 'twitter',      label: 'X / Twitter',  icon: ICONS.twitter },
    { key: 'transfermarkt',label: 'Transfermarkt',icon: ICONS.transfermarkt },
    { key: 'linkedin',     label: 'LinkedIn',     icon: ICONS.linkedin },
    { key: 'website',      label: 'Website',      icon: ICONS.link },
  ];

  // Deduplicate labels (x and twitter both map to "X / Twitter", keep first found)
  const seenLabels = new Set();
  const active = ALL_PLATFORMS.filter(pl => {
    if (seenLabels.has(pl.label)) return false;
    const data = s[pl.key];
    if (!data) return false;
    const hasHandle = !!data.handle;
    const hasUrl = data.url && data.url !== '#';
    if (!hasHandle && !hasUrl) return false;
    seenLabels.add(pl.label);
    return true;
  });

  if (!active.length) return '';

  const links = active.map((pl, i) => {
    const data = s[pl.key];
    const href = data.url || '#';
    const subtitle = data.handle || data.url || '';
    const isExternal = href !== '#';
    return `
    <a href="${href}" class="social-link reveal reveal-delay-${Math.min(i + 1, 5)}" ${isExternal ? 'target="_blank" rel="noopener"' : ''}>
      <div class="social-icon">${pl.icon}</div>
      <div>
        <div class="social-name">${pl.label}</div>
        <div class="social-handle">${subtitle}</div>
      </div>
      <div class="social-arrow">${ICONS.arrow}</div>
    </a>`;
  }).join('');

  return `
  <section id="social" style="border-top:1px solid var(--rim);">
    <div class="section">
      <div class="section-head reveal">
        <span class="section-label">${ui('sectionOnline', lang)}</span>
        <h2 class="section-title">${ui('follow', lang)}</h2>
        <span class="gold-line"></span>
      </div>
      <div class="social-list">${links}</div>
    </div>
  </section>`;
}

  const leftCol = `

    </div>` : '';

  return `
  <section id="contact" style="border-top:1px solid var(--rim);">
    <div class="section">
      <div class="section-head reveal">
        <span class="section-label">${ui('sectionContact', lang)}</span>

        <span class="gold-line"></span>

// ── Render ────────────────────────────────────────────────────

function render(p, lang) {
  const sec = p.sections || {};
  const isElite = p.package === 'elite';
  const parts = [];

  parts.push(buildHero(p, lang));

  if (shouldShow(sec, 'story', p.story))
    parts.push(buildStory(p, lang));

  if (shouldShow(sec, 'career', p.career && p.career.length))
    parts.push(buildCareer(p, lang));

  if (shouldShow(sec, 'stats', p.keyStats && p.keyStats.length))
    parts.push(buildStats(p, lang));

  if (shouldShow(sec, 'highlights', p.highlights && p.highlights.length))
    parts.push(buildHighlights(p, lang));

  if (shouldShow(sec, 'gallery', p.gallery && p.gallery.length))
    parts.push(buildGallery(p, lang));

  if (p.videos && p.videos.length)
    parts.push(buildVideos(p, lang));

  if (shouldShow(sec, 'social', hasSocialData(p)))
    parts.push(buildSocial(p, lang));

  // Elite-only sections — rendered only if package = 'elite', section is true, and data exists
  if (isElite) {
    if (shouldShow(sec, 'careerMoments', p.careerMoments && p.careerMoments.length))
      parts.push(buildCareerMoments(p, lang));

    if (shouldShow(sec, 'media', p.mediaArticles && p.mediaArticles.length))
      parts.push(buildMedia(p, lang));

    if (shouldShow(sec, 'latestUpdates', p.latestUpdates && p.latestUpdates.length))
      parts.push(buildUpdates(p, lang));

    if (shouldShow(sec, 'featuredQuote', p.featuredQuote))
      parts.push(buildQuote(p, lang));

    if (shouldShow(sec, 'personalBrand', p.personalBrandSection && p.personalBrandSection.length))
      parts.push(buildPersonalBrand(p, lang));
  }

  if (sec.contact !== false)
    parts.push(buildContact(p, sec, lang));

  parts.push(buildFooter(p, lang));

  document.getElementById('app').innerHTML = parts.join('');
  buildNav(p, sec, lang);
}

// ── Scroll reveal ─────────────────────────────────────────────

function initScrollReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// ── Stats count-up ────────────────────────────────────────────

function initStatsCounter() {
  const statEls = document.querySelectorAll('.stat-number[data-target]');
  if (!statEls.length) return;

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const target = parseInt(el.dataset.target);
      const suffix = el.dataset.suffix || '';
      const duration = 1400;
      const start = performance.now();

      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target) + suffix;
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      obs.unobserve(el);
    });
  }, { threshold: 0.5 });

  statEls.forEach(el => obs.observe(el));
}

// ── Nav scroll behavior ───────────────────────────────────────

function initNav() {
  const nav = document.getElementById('nav');
  const onScroll = () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  };
  window.addEventListener('scroll', onScroll, { passive: true });
}

// ── Hero gradient bg fallback ─────────────────────────────────

function initHeroBg(p) {
  const bg = document.querySelector('.hero-bg');
  if (!bg) return;
  if (!p.heroImage || p.heroImage.includes('placehold.co?text=')) {
    bg.style.background = 'radial-gradient(ellipse at 60% 40%, rgba(201,168,76,0.08) 0%, transparent 60%), var(--base)';
  }
}

// ── Hero video error fallback ─────────────────────────────────

function initHeroVideo() {
  const video = document.querySelector('.hero-video');
  if (!video) return;
  const source = video.querySelector('source');
  if (source) {
    source.addEventListener('error', () => video.remove());
  }
}

// ── Language switch ───────────────────────────────────────────

function setLang(lang) {
  LANG = lang;
  localStorage.setItem('sportavo-lang', lang);

  const scrollY = window.scrollY;
  render(PLAYER, LANG);

  requestAnimationFrame(() => {
    initScrollReveal();
    initStatsCounter();
    initHeroVideo();
    window.scrollTo(0, scrollY);
  });

  // Sync toggle button active state
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === LANG);
  });
}

// ── Main ──────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('/data/player.json');
    if (!res.ok) throw new Error('Could not load player.json');
    PLAYER = await res.json();

    // Restore saved language preference (default: en)
    LANG = localStorage.getItem('sportavo-lang') || 'en';

    render(PLAYER, LANG);

    requestAnimationFrame(() => {
      const loading = document.getElementById('loading');
      const app = document.getElementById('app');
      loading.style.opacity = '0';
      app.style.opacity = '1';
      setTimeout(() => loading.remove(), 400);
    });

    requestAnimationFrame(() => {
      initNav();
      initScrollReveal();
      initStatsCounter();
      initHeroBg(PLAYER);
      initHeroVideo();
    });

    // Sync toggle state with restored language
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === LANG);
    });

    // Wire up language toggle
    document.getElementById('lang-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (btn && btn.dataset.lang !== LANG) setLang(btn.dataset.lang);
    });

    document.title = `${PLAYER.name} · Official Profile · Sportavo`;
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:2rem;max-width:400px;">
        <div style="color:var(--gold);font-family:Sora,sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;">
          Profile unavailable
        </div>
        <div style="color:var(--muted);font-size:0.85rem;line-height:1.6;">
          Make sure the dev server is running:<br>
          <code style="color:var(--gold-l);font-size:0.8rem;">node serve.mjs</code>
        </div>
      </div>`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
